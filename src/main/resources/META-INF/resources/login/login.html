<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 메인 페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/toggle.js"></script>
    <script src="../js/test.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark border-bottom border-secondary" data-bs-theme="dark">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a class="navbar-brand me-2" href="/">
                    <img src="../image/a2.jpeg" alt="LOL 로고" width="40" height="40" class="d-inline-block align-text-top">
                </a>
                <button class="btn border-0 text-white" id="themeToggleBtn" type="button">🌙 DARK</button>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">뉴스</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">챔피온</a></li>
                    <li class="nav-item"><a class="nav-link" href="main_page_sub/download.html">다운로드</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">로그인</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            외부웹사이트
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="https://lol.ps/" target="_blank">롤 전적 사이트</a></li>
                            <li><a class="dropdown-item" href="https://www.op.gg/" target="_blank">OP.GG</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" id="searchForm">
                    <input class="form-control me-2" type="search" placeholder="챔피언, 뉴스 검색..." aria-label="Search" id="searchInput">
                    <button class="btn btn-outline-success" type="submit">검색하기</button>
                </form>
            </div>
        </div>
    </nav>

    <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 400px;">
            <h2 class="fw-bold mb-4">로그인</h2>
            
            <form method="POST" action="/login_check" id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label">아이디</label>
                    <input type="text" class="form-control" id="usernameInput" name="username" placeholder="4~20자 영문/숫자" required>
                    <div class="invalid-feedback" id="usernameMsg"></div>
                </div>
                
                <div class="mb-3 text-start">
                    <label class="form-label">패스워드</label>
                    <input type="password" class="form-control" id="passwordInput" placeholder="8자 이상, 영문+숫자+특수문자" required>
                    <div class="invalid-feedback" id="passwordMsg"></div>
                    <input type="hidden" id="password" name="password">
                </div>
                
                <button type="button" onclick="validateAndLogin()" class="btn btn-primary w-100 text-white">로그인</button>
                
                <hr>
                <a href="/register" class="btn btn-outline-secondary w-100">회원가입</a>
            </form>
        </div>
    </section>

    <script src="../js/search.js"></script>
    <script src="../js/input_sha256.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
