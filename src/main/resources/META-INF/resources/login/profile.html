<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 내 프로필</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/test.js"></script>
    <script src="../js/test2.js"></script>
    <script src="../js/toggle.js"></script>

    <style>
        body { background-color: #0a0e17; color: #fff; font-family: 'Arial', sans-serif; }
        .navbar { background-color: #000; }
        .hero { background: linear-gradient(to bottom, #1e1e1e, #0a0e17); min-height: 60vh; }
        .card { background-color: #1e1e1e; border: none; transition: transform 0.3s, box-shadow 0.3s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(160, 32, 240, 0.5); }
        .btn-primary { background-color: #a020f0; border: none; }
        .btn-primary:hover { background-color: #800080; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="../image/a2.jpeg" alt="LOL 로고" width="40" height="40" class="d-inline-block align-text-top">
                <button class="btn border-0 text-white" id="themeToggleBtn" type="button">
                    🌙DARK
                </button>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#">뉴스</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">챔피온</a></li>
                    <li class="nav-item"><a class="nav-link" href="main_page_sub/download.html">다운로드</a></li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/profile">👤프로필</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-outline-danger btn-sm px-3 text-white" href="/logout">로그아웃</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            외부웹사이트
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="https://lol.ps/" target="_blank">롤 전적 사이트</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" id="searchForm">
                    <input class="form-control me-2" type="search" placeholder="챔피언, 뉴스 검색..." aria-label="Search" id="searchInput">
                    <button class="btn btn-outline-success" type="submit">검색하기</button>
                </form>
            </div>
        </div>
    </nav>

    <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 500px;">
            <h2 class="fw-bold mb-4"> 👤 내 프로필</h2>
            
            <div class="mb-4">
                <img id="profileImg" src="../image/profileimage.jpeg" class="rounded-circle" width="120" height="120" style="object-fit:cover; border:3px solid #fff;" alt="프로필 사진">
            </div>
            
            <div class="card bg-dark text-white border-secondary mb-4">
                <div class="card-body text-start">
                    <table class="table table-dark table-bordered mb-0">
                        <tr>
                            <th style="width:30%">아이디</th>
                            <td id="infoUsername"></td>
                        </tr>
                        <tr>
                            <th>이메일</th>
                            <td id="infoEmail"></td>
                        </tr>
                        <tr>
                            <th>연락처</th>
                            <td id="infoPhone"></td>
                        </tr>
                    </table>
                </div>
            </div>
            
            <form id="uploadForm" method="POST" action="/profile/upload" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">프로필 사진 변경</label>
                    <input type="file" class="form-control" id="profileFile" name="profileImage" accept="image/jpeg,image/png,image/gif,image/webp">
                    <div class="form-text text-white">
                        jpg, png, gif, webp / 최대 5MB
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">사진 업로드</button>
            </form>
        </div>
    </section>

    <script src="../js/search.js"></script>
    <script src="../js/toggle.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
